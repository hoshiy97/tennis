<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Tennis Game</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a3a1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: 'Courier New', monospace;
      color: #fff;
    }
    canvas {
      border: 4px solid #a8c87a;
      box-shadow: 0 0 40px rgba(60,160,60,0.5), 0 0 80px rgba(30,100,30,0.3);
      display: block;
    }
    #info {
      margin-top: 12px;
      font-size: 13px;
      color: #7ab870;
      text-align: center;
    }
  </style>
</head>
<body>
  <canvas id="c" width="800" height="500"></canvas>
  <div id="info">W / S &nbsp;or&nbsp; ↑ / ↓ &nbsp;to move &nbsp;|&nbsp; SPACE to start / pause</div>

  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');

    const W = canvas.width;
    const H = canvas.height;
    const PAD_W = 12;
    const PAD_H = 80;
    const BALL_SIZE = 10;
    const PAD_SPEED = 6;
    const WIN_SCORE = 7;

    let state = 'idle';
    let keys = {};

    const ball = {
      x: W / 2, y: H / 2,
      vx: 0, vy: 0,
      speed: 10   // 2x faster
    };

    const player = { y: H / 2 - PAD_H / 2, score: 0 };
    const ai    = { y: H / 2 - PAD_H / 2, score: 0 };

    function resetBall(dir = 1) {
      ball.x = W / 2;
      ball.y = H / 2;
      const angle = (Math.random() * 60 - 30) * Math.PI / 180;
      ball.vx = ball.speed * dir * Math.cos(angle);
      ball.vy = ball.speed * Math.sin(angle);
    }

    function startGame() {
      player.score = 0;
      ai.score = 0;
      player.y = H / 2 - PAD_H / 2;
      ai.y    = H / 2 - PAD_H / 2;
      ball.speed = 10;
      resetBall(Math.random() < 0.5 ? 1 : -1);
      state = 'playing';
    }

    function clamp(val, min, max) {
      return Math.max(min, Math.min(max, val));
    }

    function updatePlayer() {
      if (keys['ArrowUp']   || keys['w'] || keys['W']) player.y -= PAD_SPEED;
      if (keys['ArrowDown'] || keys['s'] || keys['S']) player.y += PAD_SPEED;
      player.y = clamp(player.y, 0, H - PAD_H);
    }

    function updateAI() {
      const center = ai.y + PAD_H / 2;
      const diff = ball.y - center;
      const speed = Math.min(Math.abs(diff), PAD_SPEED * 0.85);
      ai.y += diff > 0 ? speed : -speed;
      ai.y = clamp(ai.y, 0, H - PAD_H);
    }

    function updateBall() {
      ball.x += ball.vx;
      ball.y += ball.vy;

      if (ball.y - BALL_SIZE / 2 <= 0) {
        ball.y = BALL_SIZE / 2;
        ball.vy = Math.abs(ball.vy);
      }
      if (ball.y + BALL_SIZE / 2 >= H) {
        ball.y = H - BALL_SIZE / 2;
        ball.vy = -Math.abs(ball.vy);
      }

      // Player paddle
      if (
        ball.x - BALL_SIZE / 2 <= 30 + PAD_W &&
        ball.x - BALL_SIZE / 2 >= 30 &&
        ball.y >= player.y &&
        ball.y <= player.y + PAD_H
      ) {
        ball.x = 30 + PAD_W + BALL_SIZE / 2;
        const rel = (ball.y - (player.y + PAD_H / 2)) / (PAD_H / 2);
        const angle = rel * 60 * Math.PI / 180;
        ball.speed = Math.min(ball.speed + 0.6, 30);
        ball.vx =  ball.speed * Math.cos(angle);
        ball.vy =  ball.speed * Math.sin(angle);
      }

      // AI paddle
      if (
        ball.x + BALL_SIZE / 2 >= W - 30 - PAD_W &&
        ball.x + BALL_SIZE / 2 <= W - 30 &&
        ball.y >= ai.y &&
        ball.y <= ai.y + PAD_H
      ) {
        ball.x = W - 30 - PAD_W - BALL_SIZE / 2;
        const rel = (ball.y - (ai.y + PAD_H / 2)) / (PAD_H / 2);
        const angle = rel * 60 * Math.PI / 180;
        ball.speed = Math.min(ball.speed + 0.6, 30);
        ball.vx = -ball.speed * Math.cos(angle);
        ball.vy =  ball.speed * Math.sin(angle);
      }

      if (ball.x < 0) {
        ai.score++;
        if (ai.score >= WIN_SCORE) { state = 'over'; return; }
        ball.speed = 10;
        resetBall(1);
      }
      if (ball.x > W) {
        player.score++;
        if (player.score >= WIN_SCORE) { state = 'over'; return; }
        ball.speed = 10;
        resetBall(-1);
      }
    }

    // ---- Drawing ----

    function drawCourt() {
      // Alternating grass stripes
      const stripeH = 50;
      for (let i = 0; i < Math.ceil(H / stripeH); i++) {
        ctx.fillStyle = i % 2 === 0 ? '#1e6b1e' : '#248024';
        ctx.fillRect(0, i * stripeH, W, stripeH);
      }

      // Court lines
      ctx.save();
      ctx.strokeStyle = 'rgba(255,255,255,0.65)';
      ctx.lineWidth = 2;
      ctx.setLineDash([]);

      // Top baseline
      ctx.beginPath(); ctx.moveTo(55, 22); ctx.lineTo(W - 55, 22); ctx.stroke();
      // Bottom baseline
      ctx.beginPath(); ctx.moveTo(55, H - 22); ctx.lineTo(W - 55, H - 22); ctx.stroke();
      // Left sideline
      ctx.beginPath(); ctx.moveTo(55, 22); ctx.lineTo(55, H - 22); ctx.stroke();
      // Right sideline
      ctx.beginPath(); ctx.moveTo(W - 55, 22); ctx.lineTo(W - 55, H - 22); ctx.stroke();
      // Left service line
      ctx.beginPath(); ctx.moveTo(215, 22); ctx.lineTo(215, H - 22); ctx.stroke();
      // Right service line
      ctx.beginPath(); ctx.moveTo(W - 215, 22); ctx.lineTo(W - 215, H - 22); ctx.stroke();
      // Center service line (top half)
      ctx.beginPath(); ctx.moveTo(W / 2, 22); ctx.lineTo(W / 2, H / 2 - 5); ctx.stroke();
      // Center service line (bottom half)
      ctx.beginPath(); ctx.moveTo(W / 2, H / 2 + 5); ctx.lineTo(W / 2, H - 22); ctx.stroke();

      ctx.restore();
    }

    function drawNet() {
      const nx = W / 2;

      // Net posts (top and bottom)
      ctx.fillStyle = '#ccc';
      ctx.fillRect(nx - 4, 0, 8, 18);
      ctx.fillRect(nx - 4, H - 18, 8, 18);

      // White top band of net
      ctx.fillStyle = 'rgba(255,255,255,0.9)';
      ctx.fillRect(nx - 3, 18, 6, 8);
      ctx.fillRect(nx - 3, H - 26, 6, 8);

      // Net body — vertical strings
      ctx.strokeStyle = 'rgba(255,255,255,0.25)';
      ctx.lineWidth = 1;
      ctx.setLineDash([]);
      for (let x = nx - 6; x <= nx + 6; x += 3) {
        ctx.beginPath();
        ctx.moveTo(x, 26);
        ctx.lineTo(x, H - 26);
        ctx.stroke();
      }

      // Net body — horizontal strings
      for (let y = 26; y < H - 26; y += 10) {
        ctx.beginPath();
        ctx.moveTo(nx - 6, y);
        ctx.lineTo(nx + 6, y);
        ctx.stroke();
      }

      // Center tape
      ctx.fillStyle = 'rgba(255,255,255,0.5)';
      ctx.fillRect(nx - 3, H / 2 - 2, 6, 4);
    }

    function drawRect(x, y, w, h, color) {
      ctx.fillStyle = color;
      ctx.fillRect(x, y, w, h);
    }

    function drawCircle(x, y, r, color) {
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.arc(x, y, r, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawScore() {
      ctx.font = 'bold 64px Courier New';
      ctx.fillStyle = 'rgba(255,255,255,0.18)';
      ctx.textAlign = 'center';
      ctx.fillText(player.score, W / 4, 80);
      ctx.fillText(ai.score,     W * 3 / 4, 80);
    }

    function drawPaddles() {
      ctx.shadowColor = '#4af';
      ctx.shadowBlur = 14;
      drawRect(30, player.y, PAD_W, PAD_H, '#4af');
      ctx.shadowColor = '#f84';
      drawRect(W - 30 - PAD_W, ai.y, PAD_W, PAD_H, '#f84');
      ctx.shadowBlur = 0;
    }

    function drawBall() {
      // Motion trail
      ctx.shadowColor = '#ffe';
      ctx.shadowBlur = 20;
      drawCircle(ball.x, ball.y, BALL_SIZE / 2, '#fff');
      ctx.shadowBlur = 0;

      // Tennis ball cross
      ctx.strokeStyle = 'rgba(200,220,100,0.6)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(ball.x, ball.y, BALL_SIZE / 2, 0.3, 0.3 + Math.PI);
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(ball.x, ball.y, BALL_SIZE / 2, Math.PI + 0.3, 0.3, true);
      ctx.stroke();
    }

    function drawLabels() {
      ctx.font = '14px Courier New';
      ctx.fillStyle = '#4af';
      ctx.textAlign = 'left';
      ctx.fillText('PLAYER', 30, H - 8);
      ctx.fillStyle = '#f84';
      ctx.textAlign = 'right';
      ctx.fillText('CPU', W - 30, H - 8);
    }

    function drawOverlay(title, sub) {
      ctx.fillStyle = 'rgba(0,30,0,0.65)';
      ctx.fillRect(0, 0, W, H);

      // Glow box
      ctx.strokeStyle = 'rgba(160,220,100,0.5)';
      ctx.lineWidth = 2;
      ctx.setLineDash([6, 4]);
      ctx.strokeRect(W / 2 - 220, H / 2 - 60, 440, 110);
      ctx.setLineDash([]);

      ctx.fillStyle = '#d4f08a';
      ctx.font = 'bold 52px Courier New';
      ctx.textAlign = 'center';
      ctx.shadowColor = '#8fda40';
      ctx.shadowBlur = 20;
      ctx.fillText(title, W / 2, H / 2 - 5);
      ctx.shadowBlur = 0;

      ctx.font = '20px Courier New';
      ctx.fillStyle = '#a8c870';
      ctx.fillText(sub, W / 2, H / 2 + 36);
    }

    function draw() {
      drawCourt();
      drawNet();
      drawScore();
      drawLabels();
      drawPaddles();

      if (state !== 'idle') {
        drawBall();
      }

      if (state === 'idle') {
        drawOverlay('TENNIS', 'SPACE キーでスタート');
      } else if (state === 'paused') {
        drawOverlay('PAUSE', 'SPACE キーで再開');
      } else if (state === 'over') {
        const won = player.score >= WIN_SCORE;
        drawOverlay(
          won ? 'YOU WIN!' : 'CPU WIN',
          `${player.score} - ${ai.score}  |  SPACE で再プレイ`
        );
      }
    }

    function loop() {
      if (state === 'playing') {
        updatePlayer();
        updateAI();
        updateBall();
      }
      draw();
      requestAnimationFrame(loop);
    }

    document.addEventListener('keydown', e => {
      keys[e.key] = true;
      if (e.key === ' ') {
        e.preventDefault();
        if (state === 'idle' || state === 'over') startGame();
        else if (state === 'playing') state = 'paused';
        else if (state === 'paused')  state = 'playing';
      }
    });

    document.addEventListener('keyup', e => { keys[e.key] = false; });

    loop();
  </script>
</body>
</html>
